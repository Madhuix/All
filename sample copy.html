<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch the Falling Stars</title>
    <style>
        /* Basic CSS to center the game canvas */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #000020;
            font-family: Arial, sans-serif;
        }
        canvas {
            background-color: #000030;
            border: 2px solid #fff;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        // --- 1. SETUP & CONFIGURATION ---

        // Get the canvas and its 2D rendering context
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game constants
        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 600;
        const GAME_DURATION_SECONDS = 60;

        // Game state variables
        let score = 0;
        let highScore = localStorage.getItem('starCatcherHighScore') || 0;
        let timeLeft = GAME_DURATION_SECONDS;
        let isGameRunning = false;

        // Timers and intervals
        let gameTimer;
        let starSpawner;
        let difficultyTimer;
        let gameLoopId;

        // --- 2. GAME ENTITIES (BASKET & STARS) ---

        // Basket properties
        const basket = {
            width: 100,
            height: 20,
            x: (GAME_WIDTH - 100) / 2,
            y: GAME_HEIGHT - 30,
            speed: 25,
            color: '#A52A2A' // Brown color
        };

        // Array to hold all falling stars
        let stars = [];
        let starFallSpeed = 2;

        /**
         * Draws the player's basket (a rectangle).
         * Functions under 40 lines.
         */
        function drawBasket() {
            ctx.fillStyle = basket.color;
            ctx.fillRect(basket.x, basket.y, basket.width, basket.height);
        }

        /**
         * Draws a single star (a five-pointed polygon).
         * Functions under 40 lines.
         * @param {object} star - The star object with x, y, and size.
         */
        function drawStar(star) {
            const spikes = 5;
            let rot = Math.PI / 2 * 3;
            let x = star.x;
            let y = star.y;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(star.x, star.y - star.outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = star.x + Math.cos(rot) * star.outerRadius;
                y = star.y + Math.sin(rot) * star.outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = star.x + Math.cos(rot) * star.innerRadius;
                y = star.y + Math.sin(rot) * star.innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(star.x, star.y - star.outerRadius);
            ctx.closePath();

            ctx.lineWidth = 2;
            ctx.strokeStyle = '#FFFF00'; // Yellow outline
            ctx.stroke();
            ctx.fillStyle = '#FFFF99'; // Light yellow fill
            ctx.fill();
        }

        // --- 3. PLAYER INPUT ---

        // Object to track key presses
        const keys = {
            ArrowLeft: false,
            ArrowRight: false
        };

        // Event listeners for keyboard input
        document.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) {
                keys[e.key] = true;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) {
                keys[e.key] = false;
            }
        });

        /**
         * Moves the basket based on which keys are currently pressed.
         * Functions under 40 lines.
         */
        function moveBasket() {
            if (keys.ArrowLeft && basket.x > 0) {
                basket.x -= basket.speed;
            }
            if (keys.ArrowRight && basket.x < GAME_WIDTH - basket.width) {
                basket.x += basket.speed;
            }
        }

        // --- 4. GAME MECHANICS ---

        /**
         * Creates a new star at a random horizontal position at the top.
         * Functions under 40 lines.
         */
        function spawnStar() {
            const size = Math.random() * 10 + 10; // Random size
            stars.push({
                x: Math.random() * (GAME_WIDTH - size * 2) + size,
                y: 0,
                outerRadius: size,
                innerRadius: size / 2,
                speed: starFallSpeed
            });
        }

        /**
         * Updates positions of stars, checks for collisions and off-screen stars.
         * Functions under 40 lines.
         */
        function updateStars() {
            for (let i = stars.length - 1; i >= 0; i--) {
                const star = stars[i];
                star.y += star.speed;

                // Check for collision with the basket
                if (
                    star.x > basket.x &&
                    star.x < basket.x + basket.width &&
                    star.y + star.outerRadius > basket.y &&
                    star.y < basket.y + basket.height
                ) {
                    score++; // Increase score
                    stars.splice(i, 1); // Remove caught star
                }
                // Check if star is off-screen
                else if (star.y > GAME_HEIGHT) {
                    stars.splice(i, 1); // Remove missed star
                }
            }
        }

        /**
         * Increases the falling speed of new stars every 15 seconds.
         * Functions under 40 lines.
         */
        function increaseDifficulty() {
            starFallSpeed += 0.5;
        }

        // --- 5. UI & DISPLAY ---

        /**
         * Draws the current score, high score, and time remaining.
         * Functions under 40 lines.
         */
        function drawUI() {
            ctx.fillStyle = '#FFF';
            ctx.font = '24px Arial';
            // Show score top-left
            ctx.textAlign = 'left';
            ctx.fillText(`Score: ${score}`, 10, 30);
            // Show high score top-right
            ctx.textAlign = 'right';
            ctx.fillText(`High Score: ${highScore}`, GAME_WIDTH - 10, 30);
            // Show time in the center
            ctx.textAlign = 'center';
            ctx.fillText(`Time: ${timeLeft}`, GAME_WIDTH / 2, 30);
        }

        /**
         * Displays the game over message and final score.
         * Functions under 40 lines.
         */
        function drawGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            ctx.fillStyle = '#FFF';
            ctx.font = '60px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Game Over', GAME_WIDTH / 2, GAME_HEIGHT / 2 - 40);

            ctx.font = '30px Arial';
            ctx.fillText(`Final Score: ${score}`, GAME_WIDTH / 2, GAME_HEIGHT / 2 + 20);

            ctx.font = '20px Arial';
            ctx.fillText('Click to Play Again', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 70);
        }

        /**
         * Displays the initial start screen message.
         * Functions under 40 lines.
         */
        function drawStartScreen() {
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            ctx.fillStyle = '#FFF';
            ctx.textAlign = 'center';
            ctx.font = '40px Arial';
            ctx.fillText('Catch the Falling Stars', GAME_WIDTH / 2, GAME_HEIGHT / 2 - 40);
            ctx.font = '20px Arial';
            ctx.fillText('Move the basket with Arrow Keys', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 20);
            ctx.fillText('Click to Start', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 70);
        }


        // --- 6. GAME LOOP & STATE MANAGEMENT ---

        /**
         * The main game loop, called on every frame.
         * Functions under 40 lines.
         */
        function gameLoop() {
            if (!isGameRunning) return;

            // Clear the entire canvas for the new frame
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // Update and draw game elements
            moveBasket();
            drawBasket();
            updateStars();
            stars.forEach(drawStar);
            drawUI();

            // Request the next frame
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        /**
         * Starts the game, initializes variables, and sets up timers.
         * Functions under 40 lines.
         */
        function startGame() {
            // Reset game state
            score = 0;
            timeLeft = GAME_DURATION_SECONDS;
            starFallSpeed = 2;
            stars = [];
            basket.x = (GAME_WIDTH - basket.width) / 2;
            isGameRunning = true;

            // Start game timers
            gameTimer = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // Start spawning stars and increasing difficulty
            starSpawner = setInterval(spawnStar, 800); // Spawn a star every 800ms
            difficultyTimer = setInterval(increaseDifficulty, 15000); // Speed up every 15s

            // Start the game loop
            gameLoop();
        }

        /**
         * Ends the game, clears timers, and displays the game over screen.
         * Functions under 40 lines.
         */
        function endGame() {
            isGameRunning = false;
            cancelAnimationFrame(gameLoopId);

            // Stop all game-related intervals
            clearInterval(gameTimer);
            clearInterval(starSpawner);
            clearInterval(difficultyTimer);

            // Update high score if necessary
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('starCatcherHighScore', highScore);
            }
            
            drawGameOver();
        }

        // --- 7. INITIALIZATION ---

        // Listen for a click to start or restart the game
        canvas.addEventListener('click', () => {
            if (!isGameRunning) {
                startGame();
            }
        });

        // Draw the initial start screen
        window.onload = () => {
            drawStartScreen();
        };

    </script>
</body>
</html>
